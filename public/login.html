<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Login</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: #0f172a;
        padding: 30px;
        border-radius: 15px;
        width: 320px;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }

    h2 {
        margin-bottom: 10px;
        text-align: center;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: none;
        border-radius: 8px;
        outline: none;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #3b82f6;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #2563eb;
    }

    .switch {
        text-align: center;
        margin-top: 10px;
        cursor: pointer;
        color: #60a5fa;
    }

    #mensaje {
        text-align: center;
        margin-top: 10px;
    }

    .hidden {
        display: none;
    }
</style>
</head>

<body>

<div class="container">

    <!-- REGISTRO -->
    <div id="registerBox">
        <h2>Crear cuenta</h2>
        <input type="text" id="regUsername" placeholder="Username">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Contraseña">
        <button onclick="register()">Registrarse</button>

        <div class="switch" onclick="toggle()">¿Ya tienes cuenta? Inicia sesión</div>
    </div>

    <!-- LOGIN -->
    <div id="loginBox" class="hidden">
        <h2>Iniciar sesión</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>

        <div class="switch" onclick="toggle()">Crear cuenta</div>
    </div>

    <p id="mensaje"></p>

</div>

<script>
const API = "";

function toggle() {
    document.getElementById("registerBox").classList.toggle("hidden");
    document.getElementById("loginBox").classList.toggle("hidden");
}

async function register() {
    const username = document.getElementById("regUsername").value;
    const email = document.getElementById("regEmail").value;
    const password = document.getElementById("regPassword").value;

    const res = await fetch(API + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();
    document.getElementById("mensaje").innerText = data.message || (data.success ? "Cuenta creada 🎉" : "Error");
}

async function login() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const res = await fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("mensaje").innerText = "Bienvenido " + data.username;
        window.location.href = "/index";
    } else {
        document.getElementById("mensaje").innerText = data.message;
    }
}
</script>

</body>
</html>
