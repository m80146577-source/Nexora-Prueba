<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Admin Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: #020617;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
            color: var(--accent);
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            margin-bottom: 5px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--bg-card);
            color: white;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-bar {
            background: var(--bg-card);
            border: 1px solid #334155;
            padding: 10px 15px;
            border-radius: 10px;
            width: 300px;
            color: white;
        }

        /* --- STATS GRID --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-5px); }

        .stat-card h3 { font-size: 0.9rem; color: var(--text-dim); margin: 0; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; margin: 10px 0 0 0; }

        /* --- TABLE STYLE (Better for Admin) --- */
        .data-container {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #111b2d;
            padding: 15px;
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #334155;
        }

        /* --- BADGES --- */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-admin { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .badge-pro { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .badge-user { background: rgba(59, 130, 246, 0.2); color: var(--accent); }

        /* --- BUTTONS --- */
        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-icon { background: #334155; color: white; }
        .btn-icon:hover { background: #475569; }
        .btn-danger { background: #7f1d1d; color: #f87171; }
        .btn-danger:hover { background: var(--danger); color: white; }

        .logout-btn {
            margin-top: auto;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">
        <i data-lucide="shield-check"></i> Enterprise OS
    </div>
    
    <nav>
        <a href="#" class="nav-item active"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a href="#" class="nav-item"><i data-lucide="users"></i> Usuarios</a>
        <a href="#" class="nav-item"><i data-lucide="activity"></i> Logs del Sistema</a>
        <a href="#" class="nav-item"><i data-lucide="settings"></i> Configuración</a>
    </nav>

    <button class="btn logout-btn" onclick="handleLogout()">
        <i data-lucide="log-out"></i> Cerrar Sesión
    </button>
</aside>

<main class="main-content">
    <header>
        <div>
            <h1>Panel de Control</h1>
            <p style="color: var(--text-dim)">Bienvenido, Administrador</p>
        </div>
        <input type="text" class="search-bar" placeholder="Buscar usuario o ID..." onkeyup="filterUsers(this.value)">
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Usuarios Totales</h3>
            <p id="totalUsers">0</p>
        </div>
        <div class="stat-card">
            <h3>Actividad (24h)</h3>
            <p id="totalLogs">0</p>
        </div>
        <div class="stat-card">
            <h3>Servidor</h3>
            <p style="color: var(--success)">Online</p>
        </div>
        <div class="stat-card">
            <h3>Alertas</h3>
            <p style="color: var(--danger)">0</p>
        </div>
    </div>

    <div class="data-container">
        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Suscripción</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="userTable">
                </tbody>
        </table>
    </div>
</main>

<script>
    // Inicializar Iconos
    lucide.createIcons();

    // Protección de sesión (Mejorada)
    const checkAuth = () => {
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user || user.role !== 'admin') {
            window.location.href = "/login.html";
        }
    };

    // Función genérica para API (Abstracción Profesional)
    const apiCall = async (url, method = 'GET', data = null) => {
        try {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (data) options.body = JSON.stringify(data);
            
            const res = await fetch(url, options);
            if (!res.ok) throw new Error('Error en la red');
            return await res.json();
        } catch (err) {
            Swal.fire('Error', err.message, 'error');
        }
    };

    async function loadDashboard() {
        const users = await apiCall('/admin/users');
        const logs = await apiCall('/admin/logs');

        document.getElementById("totalUsers").innerText = users.length;
        document.getElementById("totalLogs").innerText = logs.length;

        renderUsers(users);
    }

    function renderUsers(users) {
        const tbody = document.getElementById("userTable");
        tbody.innerHTML = users.map(u => `
            <tr>
                <td><strong>${u.username}</strong></td>
                <td>${u.email}</td>
                <td><span class="badge badge-${u.role}">${u.role.toUpperCase()}</span></td>
                <td><span class="badge badge-${u.permissions || 'user'}">${(u.permissions || 'BASIC').toUpperCase()}</span></td>
                <td>
                    <button class="btn btn-icon" title="Editar" onclick="editUser(${u.id})"><i data-lucide="edit-3"></i></button>
                    <button class="btn btn-icon" title="Subir PRO" onclick="updatePerms(${u.id}, 'pro')"><i data-lucide="trending-up"></i></button>
                    <button class="btn btn-danger" onclick="confirmDelete(${u.id})"><i data-lucide="trash-2"></i></button>
                </td>
            </tr>
        `).join('');
        lucide.createIcons(); // Re-renderizar iconos inyectados
    }

    // Confirmación Estilo Empresa
    async function confirmDelete(id) {
        const result = await Swal.fire({
            title: '¿Confirmar eliminación?',
            text: "Esta acción es irreversible en la base de datos.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Sí, borrar usuario'
        });

        if (result.isConfirmed) {
            await apiCall('/delete-user', 'POST', { id });
            Swal.fire('Eliminado', 'El usuario ha sido removido.', 'success');
            loadDashboard();
        }
    }

    function handleLogout() {
        localStorage.clear();
        window.location.href = "/";
    }

    // Intervalo de actualización inteligente
    setInterval(loadDashboard, 30000); // Cada 30 segs para no saturar
    loadDashboard();
</script>
</body>
</html>
