<!DOCTYPE html>
<html>
<head>
    <title>Panel Admin</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            margin: 0;
        }

        h1, h2 {
            margin: 10px 0;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .logout {
            background: #ef4444;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 140px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .section {
            padding: 0 20px;
        }

        /* GRID USUARIOS */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .role-admin {
            color: #facc15;
        }

        .role-user {
            color: #38bdf8;
        }

        button {
            margin: 5px;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete { background: #ef4444; }
        .btn-admin { background: #f59e0b; }
        .btn-user { background: #3b82f6; }
        .btn-pro { background: #22c55e; }
        .btn-basic { background: #64748b; }

        /* LOGS */
        .logs {
            max-width: 600px;
            margin: auto;
        }

        .log {
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

<script>
// 🔒 PROTECCIÓN ADMIN
const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "admin") {
    window.location.href = "/dashboard.html";
}
</script>

<div class="top">
    <h1>👑 Panel Admin</h1>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<!-- STATS -->
<div class="stats">
    <div class="stat-box">
        <h2 id="totalUsers">0</h2>
        <p>Usuarios</p>
    </div>

    <div class="stat-box">
        <h2 id="totalLogs">0</h2>
        <p>Eventos</p>
    </div>
</div>

<!-- USUARIOS -->
<div class="section">
    <h2>👥 Usuarios</h2>
    <div id="users" class="users-grid"></div>
</div>

<!-- LOGS -->
<div class="section">
    <h2>📊 Actividad</h2>
    <div id="logs" class="logs"></div>
</div>

<script>
function logout() {
    localStorage.removeItem("user");
    window.location.href = "/";
}

// CARGAR USUARIOS
async function loadUsers() {
    const res = await fetch("/admin/users");
    const data = await res.json();

    document.getElementById("totalUsers").innerText = data.length;

    const div = document.getElementById("users");
    div.innerHTML = "";

    data.forEach(u => {
        div.innerHTML += `
            <div class="card">
                <h3>${u.username}</h3>
                <p>${u.email}</p>

                <p class="${u.role === "admin" ? "role-admin" : "role-user"}">
                    Rol: ${u.role}
                </p>

                <p>Permiso: ${u.permissions || "basic"}</p>

                <div>
                    <button class="btn-admin" onclick="makeAdmin(${u.id})">Admin</button>
                    <button class="btn-user" onclick="makeUser(${u.id})">User</button>
                </div>

                <div>
                    <button class="btn-pro" onclick="setPro(${u.id})">PRO</button>
                    <button class="btn-basic" onclick="setBasic(${u.id})">Basic</button>
                </div>

                <button class="btn-delete" onclick="deleteUser(${u.id})">Eliminar</button>
            </div>
        `;
    });
}

// FUNCIONES
async function makeAdmin(id) {
    await fetch("/set-role", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, role: "admin" })
    });
    loadUsers();
}

async function makeUser(id) {
    await fetch("/set-role", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, role: "user" })
    });
    loadUsers();
}

async function setPro(id) {
    await fetch("/set-permissions", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, permissions: "pro" })
    });
    loadUsers();
}

async function setBasic(id) {
    await fetch("/set-permissions", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, permissions: "basic" })
    });
    loadUsers();
}

async function deleteUser(id) {
    await fetch("/delete-user", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id })
    });

    loadUsers();
    loadLogs();
}

// LOGS
async function loadLogs() {
    const res = await fetch("/admin/logs");
    const data = await res.json();

    document.getElementById("totalLogs").innerText = data.length;

    const div = document.getElementById("logs");
    div.innerHTML = "";

    data.slice(0, 10).forEach(log => {
        div.innerHTML += `
            <div class="log">
                <b>${log.email}</b><br>
                ${log.action}<br>
                <small>${new Date(log.created_at).toLocaleString()}</small>
            </div>
        `;
    });
}

// AUTO REFRESH
setInterval(() => {
    loadUsers();
    loadLogs();
}, 5000);

loadUsers();
loadLogs();
</script>

</body>
</html>
