<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Admin | Database Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --accent: #3b82f6;
            --border: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #000;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
            margin-bottom: 5px;
        }

        .nav-link.active, .nav-link:hover {
            background: var(--bg-card);
            color: white;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* TABLE */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            background: #111b2d;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        /* BADGES */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-admin { background: #fef3c7; color: #92400e; }
        .badge-user { background: #dbeafe; color: #1e40af; }

        /* BUTTONS */
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border); }

        /* LOADER */
        #loader { text-align: center; padding: 40px; color: var(--accent); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div style="font-weight: 800; font-size: 1.2rem; margin-bottom: 40px; color: var(--accent);">
        DB MANAGER PRO
    </div>
    <nav>
        <a href="#" class="nav-link active"><i data-lucide="database"></i> Base de Datos</a>
        <a href="#" class="nav-link"><i data-lucide="settings"></i> Configuración</a>
    </nav>
    <button onclick="location.reload()" class="btn btn-outline" style="margin-top: auto;">
        <i data-lucide="refresh-cw"></i> Refrescar DB
    </button>
</aside>

<main class="main">
    <div class="header">
        <div>
            <h1 style="margin: 0;">Usuarios en Base de Datos</h1>
            <p style="color: var(--text-dim);">Visualización en tiempo real de la tabla `users`</p>
        </div>
        <div id="db-status" class="badge" style="background: var(--success); color: #fff;">DB Conectada</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="userTable">
                </tbody>
        </table>
        <div id="loader">Cargando datos desde el servidor...</div>
    </div>
</main>

<script>
    lucide.createIcons();

    // 1. CONFIGURACIÓN DE LA URL DE TU API
    // Cambia esto por la ruta real de tu backend (ej. /api/get_users.php o /users)
    const API_URL = "/admin/users"; 

    async function fetchDatabase() {
        const tableBody = document.getElementById('userTable');
        const loader = document.getElementById('loader');

        try {
            const response = await fetch(API_URL);
            
            if (!response.ok) throw new Error("No se pudo conectar con la API");

            const data = await response.json();
            
            // Limpiar tabla y ocultar loader
            tableBody.innerHTML = "";
            loader.style.display = "none";

            if (data.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center'>No hay registros en la base de datos.</td></tr>";
                return;
            }

            // Inyectar datos reales
            data.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span style="color:var(--text-dim)">#${user.id}</span></td>
                    <td><strong>${user.username}</strong></td>
                    <td>${user.email}</td>
                    <td><span class="badge badge-${user.role}">${user.role}</span></td>
                    <td>
                        <button class="btn" onclick="modifyRole(${user.id}, '${user.role}')">
                            <i data-lucide="edit-2" style="width:14px"></i> Modificar
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
            
            lucide.createIcons();

        } catch (error) {
            loader.innerHTML = `<span style="color:var(--danger)">⚠️ Error: ${error.message}</span>`;
            document.getElementById('db-status').style.background = 'var(--danger)';
            document.getElementById('db-status').innerText = 'Desconectado';
        }
    }

    // 2. FUNCIÓN PARA MODIFICAR ROL EN LA DB
    async function modifyRole(id, currentRole) {
        const { value: newRole } = await Swal.fire({
            title: 'Cambiar Rol',
            input: 'select',
            inputOptions: {
                'admin': 'Administrador',
                'user': 'Usuario Estándar'
            },
            inputValue: currentRole,
            showCancelButton: true,
            background: '#0f172a',
            color: '#fff'
        });

        if (newRole && newRole !== currentRole) {
            try {
                const res = await fetch('/set-role', { // Tu endpoint para guardar
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, role: newRole })
                });

                if (res.ok) {
                    Swal.fire('¡Actualizado!', 'La base de datos ha sido modificada.', 'success');
                    fetchDatabase(); // Recargar datos
                }
            } catch (err) {
                Swal.fire('Error', 'No se pudo guardar el cambio.', 'error');
            }
        }
    }

    // Cargar al iniciar
    fetchDatabase();
</script>

</body>
</html>
