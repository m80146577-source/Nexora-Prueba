<!DOCTYPE html>
<html>
<head>
    <title>Panel Admin</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin-top: 20px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            width: 120px;
        }

        .card {
            background: #1e293b;
            margin: 10px auto;
            padding: 15px;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        button {
            margin-top: 10px;
            padding: 8px;
            border: none;
            border-radius: 5px;
            background: red;
            color: white;
            cursor: pointer;
        }

        .logout {
            background: #ef4444;
        }

        .section {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<script>
// 🔒 PROTECCIÓN ADMIN
const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "admin") {
    window.location.href = "/dashboard.html";
}
</script>

<div class="top">
    <h1>👑 Panel Admin</h1>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<!-- 📊 STATS -->
<div class="stats">
    <div class="stat-box">
        <h3 id="totalUsers">0</h3>
        <p>Usuarios</p>
    </div>

    <div class="stat-box">
        <h3 id="totalLogs">0</h3>
        <p>Eventos</p>
    </div>
</div>

<!-- 👥 USUARIOS -->
<div class="section">
    <h2>👥 Usuarios registrados</h2>
    <div id="users"></div>
</div>

<!-- 📊 LOGS -->
<div class="section">
    <h2>📊 Actividad reciente</h2>
    <div id="logs"></div>
</div>

<script>
function logout() {
    localStorage.removeItem("user");
    window.location.href = "/";
}

// CARGAR USUARIOS
async function loadUsers() {
    const res = await fetch("/admin/users");
    const data = await res.json();

    document.getElementById("totalUsers").innerText = data.length;

    const div = document.getElementById("users");
    div.innerHTML = "";

    data.forEach(u => {
        div.innerHTML += `
            <div class="card">
                <h3>${u.username}</h3>
                <p>${u.email}</p>
                <p>Rol: ${u.role}</p>
                <button onclick="deleteUser(${u.id})">Eliminar</button>
            </div>
        `;
    });
}

// ELIMINAR
async function deleteUser(id) {
    await fetch("/delete-user", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id })
    });

    loadUsers();
    loadLogs();
}

// CARGAR LOGS
async function loadLogs() {
    const res = await fetch("/admin/logs");
    const data = await res.json();

    document.getElementById("totalLogs").innerText = data.length;

    const div = document.getElementById("logs");
    div.innerHTML = "";

    data.slice(0, 10).forEach(log => {
        div.innerHTML += `
            <div class="card">
                <p><b>${log.email}</b></p>
                <p>${log.action}</p>
                <small>${new Date(log.created_at).toLocaleString()}</small>
            </div>
        `;
    });
}

// 🔄 AUTO ACTUALIZACIÓN
setInterval(() => {
    loadUsers();
    loadLogs();
}, 5000);

loadUsers();
loadLogs();
</script>

</body>
</html>
